<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Rainfall – Amballoor Panchayat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #e5e7eb;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }
    #root {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    /* ─── Constants ────────────────────────────────────────────────────────── */
    const SHEET_ID  = '1nScYz8mnTWbNRNcZ7Z9vKD_nCom2_VRN';
    const GID       = '576872966';
    const GVIZ_BASE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq`;
    const PAGE_SIZE = 4;

    // 4 card colour variants – design order: orange → green → purple → gold
    const VARIANTS = [
      { bg: '#fff6ed', accent: '#e48112', barBg: '#ffd6a8', barBorder: '#c48c4c' },
      { bg: '#f0f6f2', accent: '#1d9b68', barBg: '#ccebde', barBorder: '#1d9b68' },
      { bg: '#eef0fa', accent: '#5b60d5', barBg: '#c5cbec', barBorder: '#5b60d5' },
      { bg: '#fbf6eb', accent: '#9e852c', barBg: '#e3d6a7', barBorder: '#9e852c' },
    ];

    const TABS = ['day', 'week', 'month'];

    /* ─── JSONP helper (bypasses CORS for file:// and any origin) ──────────── */
    function jsonpFetch(query) {
      return new Promise((resolve, reject) => {
        const cbName = `gvizCb_${Date.now()}_${Math.floor(Math.random() * 99999)}`;

        const tqx = encodeURIComponent(`out:json;responseHandler:${cbName}`);
        const tq  = encodeURIComponent(query);
        const url = `${GVIZ_BASE}?gid=${GID}&tqx=${tqx}&tq=${tq}`;

        const timer = setTimeout(() => {
          cleanup();
          reject(new Error('Request timed out'));
        }, 20000);

        function cleanup() {
          clearTimeout(timer);
          delete window[cbName];
          if (script.parentNode) document.head.removeChild(script);
        }

        window[cbName] = (data) => {
          cleanup();
          resolve(data);
        };

        const script = document.createElement('script');
        script.src = url;
        script.onerror = () => { cleanup(); reject(new Error('Script load failed')); };
        document.head.appendChild(script);
      });
    }

    /* ─── Date utilities ───────────────────────────────────────────────────── */

    // Sheet stores dates as MMM-DD (e.g. "Feb-22" = February 22nd).
    // gviz misreads the DD as a 2-digit year, so "Feb-22" becomes Date(2022,1,1).
    // The actual day is always:  gvizYear % 100  (works for 1930→30, 2022→22, etc.)
    // The real calendar year is inferred: current year, unless that date is in the
    // future — in which case use the previous year.
    function parseGvizDate(v) {
      if (!v) return null;
      if (typeof v === 'string') {
        const m = v.match(/^Date\((\d+),(\d+),(\d+)\)$/);
        if (m) {
          const gvizYear = +m[1];
          const month    = +m[2];          // 0-indexed (Jan=0 … Dec=11)
          const day      = gvizYear % 100; // "22" stored as 2022 → day 22

          const today       = new Date();
          const currentYear = today.getFullYear();
          const candidate   = new Date(currentYear, month, day);
          const year        = candidate > today ? currentYear - 1 : currentYear;

          return new Date(year, month, day);
        }
        return new Date(v);
      }
      return new Date(v);
    }

    // "Wednesday, 22 Feb" — day name always derived from the real JS Date object
    function formatDate(d) {
      if (!d || isNaN(d)) return '';
      const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const MONS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return `${DAYS[d.getDay()]}, ${d.getDate()} ${MONS[d.getMonth()]}`;
    }

    // Returns the Monday (start of ISO week) for a given date
    function getWeekMonday(date) {
      const d = new Date(date);
      const day = d.getDay(); // 0=Sun, 1=Mon … 6=Sat
      const diff = day === 0 ? -6 : 1 - day; // shift back to Monday
      d.setDate(d.getDate() + diff);
      d.setHours(0, 0, 0, 0);
      return d;
    }

    // "3 Feb – 9 Feb" or "28 Jan – 3 Feb" for cross-month weeks
    function formatWeekRange(monday) {
      const sunday = new Date(monday);
      sunday.setDate(monday.getDate() + 6);
      const MONS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const from = `${monday.getDate()} ${MONS[monday.getMonth()]}`;
      const to   = `${sunday.getDate()} ${MONS[sunday.getMonth()]}`;
      return `${from} – ${to}`;
    }

    /* ─── Data fetching ────────────────────────────────────────────────────── */

    // WHERE clause reused in both count + data queries
    const DATA_WHERE = 'A IS NOT NULL AND (B+C+D+E+F+G+H+I+J+K+L+M) > 0';

    // One-time count of valid data rows (cached after first call)
    let _totalValid = null;
    async function getTotalValid() {
      if (_totalValid !== null) return _totalValid;
      const data = await jsonpFetch(`SELECT COUNT(A) WHERE ${DATA_WHERE}`);
      _totalValid = Math.round(data.table.rows[0].c[0].v);
      return _totalValid;
    }

    function parseRows(data) {
      if (!data?.table?.rows?.length) return [];
      const cols = data.table.cols;
      return data.table.rows.map((row) => {
        const cells = row.c || [];
        const date  = parseGvizDate(cells[0]?.v);
        const locations = {};
        for (let i = 1; i < cols.length; i++) {
          const label = cols[i].label;
          if (!label) continue;           // skip unlabelled extra columns (e.g. col N)
          const val = cells[i]?.v;
          locations[label] = val != null ? Number(val) : 0;
        }
        return { date, locations };
      });
    }

    // Fetch every valid row (used for week/month aggregation)
    async function fetchAllRows() {
      const total = await getTotalValid();
      if (total === 0) return [];
      const query = `SELECT * WHERE ${DATA_WHERE} LIMIT ${total} OFFSET 0`;
      const data  = await jsonpFetch(query);
      return parseRows(data);
    }

    // Group an array of day rows into months, newest month first
    function groupByMonth(rows) {
      const months = {};
      for (const row of rows) {
        if (!row.date) continue;
        const y = row.date.getFullYear();
        const m = row.date.getMonth();
        const key = `${y}-${String(m + 1).padStart(2, '0')}`;
        if (!months[key]) months[key] = { year: y, month: m, key, locations: {}, days: 0 };
        months[key].days += 1;
        for (const [loc, val] of Object.entries(row.locations)) {
          months[key].locations[loc] = (months[key].locations[loc] || 0) + val;
        }
      }
      return Object.values(months).sort((a, b) => b.key.localeCompare(a.key));
    }

    const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    // Group an array of day rows into weeks (Mon–Sun), newest week first
    function groupByWeek(rows) {
      const weeks = {};
      for (const row of rows) {
        if (!row.date) continue;
        const monday = getWeekMonday(row.date);
        const key    = monday.toISOString().slice(0, 10);
        if (!weeks[key]) weeks[key] = { monday, locations: {} };
        for (const [loc, val] of Object.entries(row.locations)) {
          weeks[key].locations[loc] = (weeks[key].locations[loc] || 0) + val;
        }
      }
      return Object.values(weeks).sort((a, b) => b.monday - a.monday);
    }

    // loadedCount: how many valid rows have already been shown (starts at 0)
    async function fetchPage(loadedCount) {
      const total = await getTotalValid();
      // How many rows are still above what's already loaded?
      const remaining = total - loadedCount;
      if (remaining <= 0) return [];

      // Take the next PAGE_SIZE rows counting from the end of the filtered set
      const limit  = Math.min(PAGE_SIZE, remaining);
      const offset = remaining - limit;          // rows before this page in sheet order

      const query = [
        'SELECT *',
        `WHERE ${DATA_WHERE}`,
        `LIMIT ${limit} OFFSET ${offset}`,
      ].join(' ');

      const data = await jsonpFetch(query);
      const rows = parseRows(data);

      // Sheet order is oldest-first; reverse so card 0 = most recent row in sheet
      return rows.reverse();
    }

    /* ─── Bar row ──────────────────────────────────────────────────────────── */
    // staggerMs  – delay before this bar starts animating (creates waterfall effect)
    // animateNumbers – count numeral from 0 → value in sync with the bar
    function BarRow({ name, value, maxValue, accent, barBg, barBorder, staggerMs = 0, animateNumbers = false }) {
      const target = maxValue > 0 ? Math.round((value / maxValue) * 100) : 0;

      // Bar width: starts at 0, jumps to target after stagger → CSS handles ease-out
      const [barWidth, setBarWidth] = useState(0);
      // Displayed numeral: 0 on first-load cards, final value immediately on later loads
      const [disp, setDisp] = useState(animateNumbers ? 0 : value);

      useEffect(() => {
        // Let the browser paint the 0-width bar first, then trigger the transition
        const t = setTimeout(() => setBarWidth(target), staggerMs + 30);
        return () => clearTimeout(t);
      }, []);

      useEffect(() => {
        if (!animateNumbers) { setDisp(value); return; }
        if (value <= 0)      { setDisp(value); return; }

        const DURATION = 750; // ms – must feel in sync with the CSS 0.75s
        let raf;
        const tid = setTimeout(() => {
          const t0 = performance.now();
          function tick(now) {
            const p     = Math.min((now - t0) / DURATION, 1);
            const eased = 1 - Math.pow(1 - p, 3);          // ease-out cubic
            setDisp(p < 1 ? Math.round(value * eased) : value);
            if (p < 1) raf = requestAnimationFrame(tick);
          }
          raf = requestAnimationFrame(tick);
        }, staggerMs + 30);

        return () => { clearTimeout(tid); cancelAnimationFrame(raf); };
      }, []);

      return (
        <div style={{ position: 'relative', height: 39, width: '100%' }}>
          {/* Coloured bar — CSS transition drives the ease-out grow animation */}
          <div style={{
            position: 'absolute', left: 0, top: 0,
            height: '100%',
            width: `${barWidth}%`,
            backgroundColor: barBg,
            borderBottom: `0.5px solid ${barBorder}`,
            transition: 'width 0.75s cubic-bezier(0.4, 0, 0.2, 1)',
          }} />
          {/* Location label */}
          <div style={{
            position: 'absolute', left: 0, top: 0,
            height: '100%', paddingLeft: 11,
            display: 'flex', alignItems: 'center',
            zIndex: 1, pointerEvents: 'none',
          }}>
            <span style={{
              fontFamily: "'Nunito', sans-serif",
              fontSize: 13, fontWeight: 500,
              color: accent, whiteSpace: 'nowrap',
              opacity: disp === 0 ? 0.5 : 1,
            }}>
              {name.replace(/\w+/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())}
            </span>
          </div>
          {/* Rainfall numeral */}
          <div style={{
            position: 'absolute', right: 8, top: 0,
            height: '100%', display: 'flex', alignItems: 'center', gap: 4,
            zIndex: 1,
          }}>
            <span style={{ width: 18, textAlign: 'center', fontSize: 13 }}>
              {disp > 50 ? '⛈️' : ''}
            </span>
            <span style={{
              fontFamily: "'Nunito', sans-serif",
              fontSize: 11, fontWeight: 700, color: accent,
              width: 28, textAlign: 'right',
            }}>
              {disp > 0 ? disp : '☀️'}
            </span>
          </div>
        </div>
      );
    }

    /* ─── Gap summary (dry spell between two cards) ───────────────────────── */
    function GapSummary({ olderDate, newerDate }) {
      const DAY_MS  = 24 * 60 * 60 * 1000;
      const rawDiff = Math.round((newerDate - olderDate) / DAY_MS);
      // rawDiff 1 = consecutive days (no gap), 2 = exactly 1 skipped day, etc.
      if (rawDiff <= 1) return null;

      const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const MONS   = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const fmt    = (d) => `${DAYS[d.getDay()]}, ${MONS[d.getMonth()]} ${d.getDate()}`;
      const from   = new Date(olderDate.getTime() + DAY_MS);  // day after older card
      const to     = new Date(newerDate.getTime()  - DAY_MS); // day before newer card
      const days   = rawDiff - 1;

      const bold = (str) => <span style={{ fontWeight: 600 }}>{str}</span>;

      const content = rawDiff === 2
        ? <span>☀️ No rain on {bold(fmt(from))}</span>
        : <span>☀️ No rain between {bold(fmt(to))} to {bold(fmt(from))} ({days} days)</span>;

      return (
        <div style={{
          textAlign: 'center',
          color: '#c48c4c',           // warm amber from the design's own palette
          fontSize: 13,
          fontFamily: "'Nunito', sans-serif",
          fontWeight: 500,
          padding: '2px 0',
          opacity: 0.85,
        }}>
          {content}
        </div>
      );
    }

    /* ─── Date card ────────────────────────────────────────────────────────── */
    function DateCard({ data, colorIdx, animateNumbers, globalMax }) {
      const v = VARIANTS[colorIdx % 4];
      // Sort locations A → Z
      const sorted = Object.entries(data.locations).sort(([a], [b]) => a.localeCompare(b));
      const maxVal = globalMax || Math.max(...sorted.map(([, n]) => n), 1);

      return (
        <div style={{
          backgroundColor: v.bg,
          borderRadius: 9.32, padding: 16,
          display: 'flex', flexDirection: 'column', gap: 16,
          border: '1.34px solid rgba(0,0,0,0.07)',
        }}>
          <div style={{
            fontFamily: "'Nunito', sans-serif",
            fontSize: 16, fontWeight: 700,
            color: v.accent,
            letterSpacing: '0.066px',
          }}>
            {formatDate(data.date)}
          </div>
          <div>
            {sorted.map(([name, value], i) => (
              <BarRow
                key={name} name={name} value={value} maxValue={maxVal}
                accent={v.accent} barBg={v.barBg} barBorder={v.barBorder}
                staggerMs={i * 50} animateNumbers={animateNumbers}
              />
            ))}
          </div>
        </div>
      );
    }

    /* ─── Week card ────────────────────────────────────────────────────────── */
    function WeekCard({ data, colorIdx, animateNumbers }) {
      const v      = VARIANTS[colorIdx % 4];
      const sorted = Object.entries(data.locations).sort(([a], [b]) => a.localeCompare(b));
      const maxVal = Math.max(...sorted.map(([, n]) => n), 1);

      return (
        <div style={{
          backgroundColor: v.bg,
          borderRadius: 9.32, padding: 16,
          display: 'flex', flexDirection: 'column', gap: 16,
          border: '1.34px solid rgba(0,0,0,0.07)',
        }}>
          <div style={{
            fontFamily: "'Nunito', sans-serif",
            fontSize: 16, fontWeight: 700,
            color: v.accent,
            letterSpacing: '0.066px',
          }}>
            {formatWeekRange(data.monday)}
          </div>
          <div>
            {sorted.map(([name, value], i) => (
              <BarRow
                key={name} name={name} value={Math.round(value)} maxValue={Math.round(maxVal)}
                accent={v.accent} barBg={v.barBg} barBorder={v.barBorder}
                staggerMs={i * 50} animateNumbers={animateNumbers}
              />
            ))}
          </div>
        </div>
      );
    }

    /* ─── Location daily card (Browse by Week mode) ────────────────────────── */
    const MONS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    function LocationBrowseCard({ name, days, colorIdx }) {
      const v      = VARIANTS[colorIdx % 4];
      const maxVal = Math.max(...days.map(d => d.value), 1);
      return (
        <div style={{
          backgroundColor: v.bg, borderRadius: 9.32, padding: 16,
          display: 'flex', flexDirection: 'column', gap: 12,
          border: '1.34px solid rgba(0,0,0,0.07)',
        }}>
          <div style={{
            fontFamily: "'Nunito', sans-serif",
            fontSize: 15, fontWeight: 700, color: v.accent, letterSpacing: '0.066px',
          }}>
            {name.replace(/\w+/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())}
          </div>
          <div>
            {days.map((d, i) => {
              const label = `${DAYS_SHORT[d.date.getDay()]} ${d.date.getDate()} ${MONS_SHORT[d.date.getMonth()]}`;
              return (
                <BarRow
                  key={d.date.toISOString()}
                  name={label} value={d.value} maxValue={maxVal}
                  accent={v.accent} barBg={v.barBg} barBorder={v.barBorder}
                  staggerMs={i * 40} animateNumbers={false}
                />
              );
            })}
          </div>
        </div>
      );
    }

    /* ─── Month calendar card (Location browse mode) ───────────────────────── */
    const CAL_DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

    function MonthCalendarCard({ name, year, month, dayMap, colorIdx }) {
      const v = VARIANTS[colorIdx % 4];

      // Build grid: pad from Monday of the week containing the 1st
      const firstDay = new Date(year, month, 1);
      // Monday=0 … Sunday=6
      const startPad = (firstDay.getDay() + 6) % 7;
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const cells = [];
      for (let i = 0; i < startPad; i++) cells.push(null);
      for (let d = 1; d <= daysInMonth; d++) cells.push(d);

      return (
        <div style={{
          backgroundColor: v.bg, borderRadius: 9.32, padding: 16,
          display: 'flex', flexDirection: 'column', gap: 12,
          border: '1.34px solid rgba(0,0,0,0.07)',
        }}>
          <div style={{ fontFamily:"'Nunito',sans-serif", fontSize:15, fontWeight:700, color:v.accent }}>
            {name.replace(/\w+/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())}
          </div>

          {/* Day-of-week header */}
          <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:2 }}>
            {CAL_DAYS.map(d => (
              <div key={d} style={{
                fontFamily:"'Nunito',sans-serif", fontSize:10, fontWeight:600,
                color: v.accent, textAlign:'center', opacity:0.6, paddingBottom:2,
              }}>{d}</div>
            ))}

            {/* Date cells */}
            {cells.map((day, i) => {
              if (!day) return <div key={`pad-${i}`} />;
              const val = dayMap[day];
              const hasRain = val != null && val > 0;
              return (
                <div key={day} style={{
                  display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
                  borderRadius:6, padding:'4px 2px', minHeight:38,
                  backgroundColor: hasRain ? v.barBg : 'transparent',
                  border: hasRain ? `0.5px solid ${v.barBorder}` : '0.5px solid transparent',
                }}>
                  {hasRain ? (
                    <span style={{ fontFamily:"'Nunito',sans-serif", fontSize:10, fontWeight:700, color:v.accent, textAlign:'center', lineHeight:1.2 }}>
                      {val}<span style={{ fontSize:8, fontWeight:500 }}>mm</span>
                    </span>
                  ) : (
                    <span style={{ fontFamily:"'Nunito',sans-serif", fontSize:11, fontWeight:500, color:'#bbb' }}>
                      {day}
                    </span>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    /* ─── Location line chart (Month → Location view) ──────────────────────── */
    function LocationLineChart({ locName, year, month, monthRows }) {
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const allPts = Array.from({ length: daysInMonth }, (_, i) => {
        const d = i + 1;
        const row = monthRows.find(r => r.date.getDate() === d);
        return { day: d, val: row ? Math.round(row.locations[locName] ?? 0) : 0 };
      });

      const [viewRange, setViewRange] = useState([0, allPts.length - 1]);
      const [tooltip, setTooltip] = useState(null);
      const touchRef = React.useRef({});
      const containerRef = React.useRef(null);

      const pts = allPts.slice(viewRange[0], viewRange[1] + 1);
      const peakVal = Math.max(...pts.map(p => p.val), 1);
      const maxVal = Math.ceil(peakVal / 5) * 5 + 10; // round up to next multiple of 5, +10 headroom
      const yTicks = Array.from({ length: Math.floor(maxVal / 5) + 1 }, (_, i) => i * 5).filter(t => t <= maxVal);

      const W = 320, H = 213, PL = 28, PR = 6, PT = 12, PB = 30;
      const chartW = W - PL - PR, chartH = H - PT - PB;

      const cx = (i) => PL + (i / Math.max(pts.length - 1, 1)) * chartW;
      const cy = (v) => PT + chartH - (v / maxVal) * chartH;
      const coords = pts.map((p, i) => ({ x: cx(i), y: cy(p.val) }));

      let linePath = coords.length > 1 ? `M ${coords[0].x} ${coords[0].y}` : '';
      for (let i = 1; i < coords.length; i++) {
        const p = coords[i-1], c = coords[i];
        const mx = (p.x + c.x) / 2;
        linePath += ` C ${mx} ${p.y} ${mx} ${c.y} ${c.x} ${c.y}`;
      }
      const fillPath = coords.length > 1
        ? `${linePath} L ${coords[coords.length-1].x} ${PT+chartH} L ${coords[0].x} ${PT+chartH} Z`
        : '';
      const gradId = `lcg-${locName.replace(/\W/g,'')}`;

      // X labels: multiples of 5 (5, 10, 15 …) plus day 1
      const xLabels = pts.filter(p => p.day === 1 || p.day % 5 === 0);

      const getSvgIdx = (clientX) => {
        const rect = containerRef.current?.getBoundingClientRect();
        if (!rect) return 0;
        const svgX = (clientX - rect.left) / rect.width * W;
        return Math.max(0, Math.min(pts.length - 1, Math.round((svgX - PL) / chartW * (pts.length - 1))));
      };

      const handleTouchStart = (e) => {
        if (e.touches.length === 1) {
          const idx = getSvgIdx(e.touches[0].clientX);
          setTooltip(idx);
          touchRef.current.single = { startX: e.touches[0].clientX, startRange: [...viewRange] };
        } else if (e.touches.length === 2) {
          touchRef.current.pinch = {
            startDist: Math.abs(e.touches[0].clientX - e.touches[1].clientX),
            startRange: [...viewRange],
          };
          setTooltip(null);
        }
      };

      const handleTouchMove = (e) => {
        e.preventDefault();
        if (e.touches.length === 1 && touchRef.current.single) {
          setTooltip(getSvgIdx(e.touches[0].clientX));
          const dx = e.touches[0].clientX - touchRef.current.single.startX;
          const [s, en] = touchRef.current.single.startRange;
          const range = en - s;
          const shift = Math.round(-dx / (containerRef.current?.getBoundingClientRect().width || 1) * range);
          const newS = Math.max(0, Math.min(allPts.length - 1 - range, s + shift));
          setViewRange([newS, newS + range]);
        } else if (e.touches.length === 2 && touchRef.current.pinch) {
          const dist = Math.abs(e.touches[0].clientX - e.touches[1].clientX);
          const scale = touchRef.current.pinch.startDist / dist;
          const [s, en] = touchRef.current.pinch.startRange;
          const center = (s + en) / 2;
          const half = Math.max(2, Math.min((allPts.length - 1) / 2, ((en - s) / 2) * scale));
          setViewRange([Math.max(0, Math.round(center - half)), Math.min(allPts.length - 1, Math.round(center + half))]);
        }
      };

      const handleTouchEnd = () => {
        touchRef.current = {};
        setTimeout(() => setTooltip(null), 1800);
      };

      return (
        <div
          ref={containerRef}
          onTouchStart={handleTouchStart}
          onTouchMove={handleTouchMove}
          onTouchEnd={handleTouchEnd}
          onMouseMove={(e) => setTooltip(getSvgIdx(e.clientX))}
          onMouseLeave={() => setTooltip(null)}
          style={{ touchAction:'none', userSelect:'none', margin:'0 -16px' }}
        >
          <svg viewBox={`0 0 ${W} ${H}`} style={{ width:'100%', display:'block' }}>
            <defs>
              <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#155dfc" stopOpacity="0.22" />
                <stop offset="100%" stopColor="#155dfc" stopOpacity="0.01" />
              </linearGradient>
            </defs>

            {/* Grid + Y labels */}
            {yTicks.map((tick, i) => (
              <g key={i}>
                <line x1={PL} y1={cy(tick)} x2={W-PR} y2={cy(tick)} stroke="#e5e7eb" strokeWidth="0.7" strokeDasharray="3 3" />
                <text x={PL-3} y={cy(tick)+3.5} textAnchor="end" fill="#99a1af" fontSize="7" fontFamily="Nunito,sans-serif">{tick}</text>
              </g>
            ))}

            {/* Y axis label */}
            <text x={7} y={PT + chartH/2} textAnchor="middle" fill="#99a1af" fontSize="7" fontFamily="Nunito,sans-serif"
              transform={`rotate(-90,7,${PT + chartH/2})`}>Rain</text>

            {/* Fill + line */}
            <path d={fillPath} fill={`url(#${gradId})`} />
            <path d={linePath} fill="none" stroke="#155dfc" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />

            {/* Dots */}
            {pts.map((p, i) => p.val > 0 && (
              <circle key={i} cx={coords[i].x} cy={coords[i].y} r="2" fill="#155dfc" />
            ))}

            {/* X labels */}
            {xLabels.map((p, i) => (
              <text key={i} x={cx(pts.indexOf(p))} y={H-14} textAnchor="middle" fill="#99a1af" fontSize="7" fontFamily="Nunito,sans-serif">
                {p.day}
              </text>
            ))}

            {/* X axis label */}
            <text x={PL + chartW/2} y={H-3} textAnchor="middle" fill="#99a1af" fontSize="7" fontFamily="Nunito,sans-serif">Dates</text>

            {/* Tooltip crosshair */}
            {tooltip !== null && tooltip < pts.length && (() => {
              const p = pts[tooltip];
              const x = cx(tooltip), y = cy(p.val);
              const tipW = 52, tipH = 18, tipX = Math.min(W - PR - tipW, Math.max(PL, x - tipW/2));
              return (
                <>
                  <line x1={x} y1={PT} x2={x} y2={PT+chartH} stroke="#155dfc" strokeWidth="0.8" strokeDasharray="3 2" opacity="0.5" />
                  <circle cx={x} cy={y} r="4" fill="#155dfc" stroke="#fff" strokeWidth="1.5" />
                  <rect x={tipX} y={y-26} width={tipW} height={tipH} rx={5} fill="#155dfc" />
                  <text x={tipX + tipW/2} y={y-13} textAnchor="middle" fill="#fff" fontSize="8" fontWeight="bold" fontFamily="Nunito,sans-serif">
                    {p.day} · {p.val}mm
                  </text>
                </>
              );
            })()}
          </svg>
        </div>
      );
    }

    /* ─── Month card ───────────────────────────────────────────────────────── */
    function MonthCard({ data, colorIdx, globalMax }) {
      const v      = VARIANTS[colorIdx % 4];
      const sorted = Object.entries(data.locations).sort(([a], [b]) => a.localeCompare(b));
      const maxVal = globalMax || Math.max(...sorted.map(([, n]) => n), 1);

      return (
        <div style={{
          backgroundColor: v.bg, borderRadius: 9.32, padding: 16,
          display: 'flex', flexDirection: 'column', gap: 16,
          border: '1.34px solid rgba(0,0,0,0.07)',
        }}>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>
            <div style={{ fontFamily: "'Nunito', sans-serif", fontSize: 16, fontWeight: 700, color: v.accent }}>
              {MONTH_NAMES[data.month]} {data.year}
            </div>
            <div style={{ fontFamily: "'Nunito', sans-serif", fontSize: 12, fontWeight: 500, color: v.accent, opacity: 0.6 }}>
              {data.days} days
            </div>
          </div>
          <div>
            {sorted.map(([name, value], i) => (
              <BarRow
                key={name} name={name} value={Math.round(value)} maxValue={Math.round(maxVal)}
                accent={v.accent} barBg={v.barBg} barBorder={v.barBorder}
                staggerMs={i * 50} animateNumbers={false}
              />
            ))}
          </div>
        </div>
      );
    }

    /* ─── App ──────────────────────────────────────────────────────────────── */
    function App() {
      const [cards, setCards]         = useState([]);
      // loadedCount: number of valid sheet rows already shown (starts at 0)
      const [loadedCount, setLoaded]  = useState(0);
      const [loading, setLoading]     = useState(false);
      const [hasMore, setHasMore]     = useState(true);
      const [error, setError]         = useState('');
      const [activeTab, setActiveTab] = useState('day');

      // Week view state
      const [weekCards, setWeekCards]   = useState([]);
      const [weekLoading, setWeekLoading] = useState(false);
      const [weekError, setWeekError]   = useState('');
      const [weekLoaded, setWeekLoaded] = useState(false);
      const [weekViewMode, setWeekViewMode] = useState('all');   // 'all' | 'browse'
      const [selectedWeek, setSelectedWeek] = useState('');
      const [allRows, setAllRows] = useState([]);

      // Month view state
      const [monthCards, setMonthCards]   = useState([]);
      const [monthLoading, setMonthLoading] = useState(false);
      const [monthError, setMonthError]   = useState('');
      const [monthLoaded, setMonthLoaded] = useState(false);
      const [monthViewMode, setMonthViewMode] = useState('all'); // 'all' | 'browse'
      const [selectedMonth, setSelectedMonth] = useState('');
      const [selectedLocation, setSelectedLocation] = useState('');

      const load = useCallback(async (currentLoaded) => {
        setLoading(true);
        setError('');
        const isInitial = currentLoaded === 0;
        try {
          const rows = await fetchPage(currentLoaded);
          if (rows.length === 0 || rows.length < PAGE_SIZE) setHasMore(false);
          setCards((prev) => [...prev, ...rows.map(r => ({ ...r, isInitial }))]);
          setLoaded(currentLoaded + rows.length);
        } catch (e) {
          setError(`Failed to load: ${e.message}`);
          console.error(e);
        } finally {
          setLoading(false);
        }
      }, []);

      const loadWeeks = useCallback(async () => {
        setWeekLoading(true);
        setWeekError('');
        try {
          const rows    = await fetchAllRows();
          const grouped = groupByWeek(rows);
          setWeekCards(grouped.map((w, i) => ({ ...w, isInitial: i < 6 })));
          setAllRows(rows);
          setWeekLoaded(true);
        } catch (e) {
          setWeekError(`Failed to load: ${e.message}`);
          console.error(e);
        } finally {
          setWeekLoading(false);
        }
      }, []);

      const loadMonths = useCallback(async () => {
        setMonthLoading(true);
        setMonthError('');
        try {
          const rows    = allRows.length > 0 ? allRows : await fetchAllRows();
          if (allRows.length === 0) setAllRows(rows);
          const grouped = groupByMonth(rows);
          setMonthCards(grouped);
          setMonthLoaded(true);
        } catch (e) {
          setMonthError(`Failed to load: ${e.message}`);
        } finally {
          setMonthLoading(false);
        }
      }, [allRows]);

      useEffect(() => { load(0); }, []);

      useEffect(() => {
        if (activeTab === 'week' && !weekLoaded && !weekLoading) loadWeeks();
        if (activeTab === 'month' && !monthLoaded && !monthLoading) loadMonths();
      }, [activeTab]);

      return (
        <div style={{
          padding: '12px 16px 32px',
          display: 'flex', flexDirection: 'column', gap: 22,
          fontFamily: "'Nunito', sans-serif",
          minHeight: '100vh', backgroundColor: '#fff',
        }}>

          {/* ── Header card ─────────────────────────────────────────────── */}
          <div style={{
            borderRadius: 9.32, padding: 0,
            display: 'flex', flexDirection: 'column', gap:16,
          }}>
            <div style={{ display: 'flex', flexDirection: 'row', alignItems: 'center', gap: 16 }}>
              <img
                src="logo (8).png"
                alt="Government of Kerala emblem"
                style={{ width: 52, height: 'auto', flexShrink: 0, marginTop:10 }}
              />
              <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                <div style={{
                  fontFamily: "'Nunito', sans-serif",
                  fontSize: 24, fontWeight: 700,
                  color: '#00000', letterSpacing: 0.37,
                }}>
                  Amballoor
                </div>
                <div style={{
                  fontFamily: "'Nunito', sans-serif",
                  fontSize: 16, fontWeight: 400,
                
                  color: '##00000', letterSpacing: -0.41, lineHeight:0.5
                }}>
                  Panchayat
                </div>
              </div>
            </div>

          </div>

          {/* Tabs */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, position: 'sticky', top: 0, backgroundColor: '#fff', zIndex: 10, padding: '8px 16px', margin: '0 -16px',  }}>
            {TABS.map((tab) => (
              <button key={tab} onClick={() => setActiveTab(tab)}
                style={{ display:'flex', alignItems:'center', gap:4, background:'none', border:'none', cursor:'pointer', padding:0 }}>
                {activeTab === tab && (
                  <div style={{ width:8, height:8, borderRadius:'50%', backgroundColor:'#155dfc', flexShrink:0 }} />
                )}
                <span style={{
                  fontFamily: "'Nunito', sans-serif",
                  fontSize: 16, fontWeight: 500,
                  color: activeTab === tab ? '#155dfc' : '#99a1af',
                  letterSpacing: -0.41, lineHeight: 1.63,
                }}>
                  {tab}
                </span>
              </button>
            ))}
          </div>

          {/* ── Day view ────────────────────────────────────────────────── */}
          {activeTab === 'day' && (<>
            {(() => {
              const globalMax = Math.max(...cards.flatMap(c => Object.values(c.locations)), 1);
              return cards.map((card, i) => (
              <React.Fragment key={card.date ? card.date.toISOString() : i}>
                <DateCard data={card} colorIdx={i} animateNumbers={card.isInitial} globalMax={globalMax} />
                {i < cards.length - 1 && card.date && cards[i + 1].date && (
                  <GapSummary olderDate={cards[i + 1].date} newerDate={card.date} />
                )}
              </React.Fragment>
            ));
            })()}
            {loading && (
              <div style={{ textAlign:'center', color:'#155dfc', fontFamily:"'Nunito',sans-serif", fontSize:14, padding:'8px 0' }}>
                Loading…
              </div>
            )}
            {error && (
              <div style={{ textAlign:'center', color:'#e44', fontFamily:"'Nunito',sans-serif", fontSize:13, padding:'8px 0' }}>
                {error}
              </div>
            )}
            {!loading && hasMore && (
              <button onClick={() => load(loadedCount)} style={{
                fontFamily: "'Nunito', sans-serif",
                fontSize: 16, fontWeight: 500,
                color: '#155dfc', background: 'transparent',
                border: '1.34px solid #155dfc',
                borderRadius: 9.32, padding: '12px 0',
                cursor: 'pointer', width: '100%', letterSpacing: -0.41,
              }}>
                Show Previous Dates
              </button>
            )}
            {!loading && !hasMore && cards.length > 0 && (
              <div style={{ textAlign:'center', color:'#99a1af', fontFamily:"'Nunito',sans-serif", fontSize:13 }}>
                All dates loaded
              </div>
            )}
          </>)}

          {/* ── Week view ───────────────────────────────────────────────── */}
          {activeTab === 'week' && (<>
            {/* Toggle: All Weeks / View by Location */}
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginTop: -11, marginBottom: 1 }}>
              <div style={{ display:'flex', background:'#f1f3f6', borderRadius:99, padding:2, gap:0 }}>
                {[['all','Week'],['browse','Location']].map(([mode, label]) => (
                  <button key={mode} onClick={() => setWeekViewMode(mode)} style={{
                    fontFamily: "'Nunito', sans-serif",
                    fontSize: 13, fontWeight: 600,
                    padding: '5px 16px', borderRadius: 99, border: 'none',
                    cursor: 'pointer', transition: 'all 0.18s',
                    background: weekViewMode === mode ? '#fff' : 'transparent',
                    color: weekViewMode === mode ? '#155dfc' : '#99a1af',
                    boxShadow: weekViewMode === mode ? '0 1px 4px rgba(0,0,0,0.10)' : 'none',
                  }}>
                    {label}
                  </button>
                ))}
              </div>
              {/* Week picker shown only in browse mode */}
              {weekViewMode === 'browse' && weekCards.length > 0 && (
                <div style={{ position: 'relative' }}>
                  {/* Invisible native select covers the pill to trigger native picker */}
                  <select
                    value={selectedWeek || weekCards[0].monday.toISOString().slice(0,10)}
                    onChange={e => setSelectedWeek(e.target.value)}
                    style={{
                      position: 'absolute', inset: 0,
                      opacity: 0, cursor: 'pointer',
                      width: '100%', height: '100%',
                    }}
                  >
                    {weekCards.map(week => {
                      const key = week.monday.toISOString().slice(0,10);
                      return (
                        <option key={key} value={key}>
                          {formatWeekRange(week.monday)}
                        </option>
                      );
                    })}
                  </select>
                  {/* Visible pill: calendar icon + week range */}
                  <div style={{
                    borderRadius: 99, border: '1.34px solid #d1d5db', background: '#fff',
                    display: 'flex', alignItems: 'center', gap: 6,
                    padding: '5px 12px', pointerEvents: 'none',
                  }}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a1a2e" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                      <line x1="16" y1="2" x2="16" y2="6"/>
                      <line x1="8" y1="2" x2="8" y2="6"/>
                      <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                    <span style={{ fontFamily: "'Nunito', sans-serif", fontSize: 13, fontWeight: 600, color: '#1a1a2e' }}>
                      {formatWeekRange(weekCards.find(w => w.monday.toISOString().slice(0,10) === (selectedWeek || weekCards[0].monday.toISOString().slice(0,10)))?.monday || weekCards[0].monday)}
                    </span>
                  </div>
                </div>
              )}
            </div>

            {weekLoading && (
              <div style={{ textAlign:'center', color:'#155dfc', fontFamily:"'Nunito',sans-serif", fontSize:14, padding:'8px 0' }}>
                Loading…
              </div>
            )}
            {weekError && (
              <div style={{ textAlign:'center', color:'#e44', fontFamily:"'Nunito',sans-serif", fontSize:13, padding:'8px 0' }}>
                {weekError}
              </div>
            )}

            {weekViewMode === 'all' && weekCards.map((week, i) => (
              <WeekCard key={week.monday.toISOString()} data={week} colorIdx={i} animateNumbers={week.isInitial} />
            ))}

            {weekViewMode === 'browse' && (() => {
              const key    = selectedWeek || (weekCards[0] && weekCards[0].monday.toISOString().slice(0,10));
              const week   = weekCards.find(w => w.monday.toISOString().slice(0,10) === key);
              if (!week) return null;

              // Build 7 dates Mon–Sun for this week
              const weekDates = Array.from({ length: 7 }, (_, i) => {
                const d = new Date(week.monday);
                d.setDate(week.monday.getDate() + i);
                return d;
              });

              // Collect all location names (sorted)
              const locationNames = Object.keys(week.locations).sort((a, b) => a.localeCompare(b));

              // Map raw rows by date key for quick lookup
              const rowByDate = {};
              for (const row of allRows) {
                if (!row.date) continue;
                const rKey = getWeekMonday(row.date).toISOString().slice(0,10);
                if (rKey !== key) continue;
                rowByDate[row.date.toISOString().slice(0,10)] = row;
              }

              return locationNames.map((locName, li) => {
                const days = weekDates.map(d => ({
                  date: d,
                  value: Math.round(rowByDate[d.toISOString().slice(0,10)]?.locations[locName] ?? 0),
                }));
                return (
                  <LocationBrowseCard key={locName} name={locName} days={days} colorIdx={li} />
                );
              });
            })()}

            {!weekLoading && weekLoaded && weekCards.length === 0 && (
              <div style={{ textAlign:'center', color:'#99a1af', fontFamily:"'Nunito',sans-serif", fontSize:13 }}>
                No data available
              </div>
            )}
          </>)}

          {/* ── Month view ──────────────────────────────────────────────── */}
          {activeTab === 'month' && (<>
            {/* Toggle: Month / Location */}
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginTop: -11, marginBottom: 1 }}>
              <div style={{ display:'flex', background:'#f1f3f6', borderRadius:99, padding:2, gap:0 }}>
                {[['all','Month'],['browse','Location']].map(([mode, label]) => (
                  <button key={mode} onClick={() => setMonthViewMode(mode)} style={{
                    fontFamily: "'Nunito', sans-serif",
                    fontSize: 13, fontWeight: 600,
                    padding: '5px 16px', borderRadius: 99, border: 'none',
                    cursor: 'pointer', transition: 'all 0.18s',
                    background: monthViewMode === mode ? '#fff' : 'transparent',
                    color: monthViewMode === mode ? '#155dfc' : '#99a1af',
                    boxShadow: monthViewMode === mode ? '0 1px 4px rgba(0,0,0,0.10)' : 'none',
                  }}>
                    {label}
                  </button>
                ))}
              </div>
              {/* Month picker shown in both modes */}
              {monthCards.length > 0 && (
                <div style={{ position: 'relative' }}>
                  <select
                    value={selectedMonth || monthCards[0].key}
                    onChange={e => setSelectedMonth(e.target.value)}
                    style={{ position:'absolute', inset:0, opacity:0, cursor:'pointer', width:'100%', height:'100%' }}
                  >
                    {monthCards.map(m => (
                      <option key={m.key} value={m.key}>{MONTH_NAMES[m.month]} {m.year}</option>
                    ))}
                  </select>
                  <div style={{
                    borderRadius:99, border:'1.34px solid #d1d5db', background:'#fff',
                    display:'flex', alignItems:'center', gap:6, padding:'5px 12px', pointerEvents:'none',
                  }}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a1a2e" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                      <line x1="16" y1="2" x2="16" y2="6"/>
                      <line x1="8" y1="2" x2="8" y2="6"/>
                      <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                    <span style={{ fontFamily:"'Nunito',sans-serif", fontSize:13, fontWeight:600, color:'#1a1a2e' }}>
                      {(() => { const m = monthCards.find(m => m.key === (selectedMonth || monthCards[0].key)); return m ? `${MONTH_NAMES[m.month]} ${m.year}` : ''; })()}
                    </span>
                  </div>
                </div>
              )}
            </div>

            {monthLoading && (
              <div style={{ textAlign:'center', color:'#155dfc', fontFamily:"'Nunito',sans-serif", fontSize:14, padding:'8px 0' }}>
                Loading…
              </div>
            )}
            {monthError && (
              <div style={{ textAlign:'center', color:'#e44', fontFamily:"'Nunito',sans-serif", fontSize:13, padding:'8px 0' }}>
                {monthError}
              </div>
            )}

            {monthViewMode === 'browse' && (() => {
              const key   = selectedMonth || (monthCards[0] && monthCards[0].key);
              const mData = monthCards.find(m => m.key === key);
              if (!mData) return null;

              const monthRows = allRows.filter(row => {
                if (!row.date) return false;
                const y = row.date.getFullYear(), mo = row.date.getMonth();
                return `${y}-${String(mo+1).padStart(2,'0')}` === key;
              }).sort((a, b) => a.date - b.date);

              const locationNames = Object.keys(mData.locations).sort((a, b) => a.localeCompare(b));
              const activeLoc = selectedLocation && locationNames.includes(selectedLocation)
                ? selectedLocation : locationNames[0];

              return (
                <>
                  {/* Location picker */}
                  <div style={{ position:'relative' }}>
                    <select
                      value={activeLoc}
                      onChange={e => setSelectedLocation(e.target.value)}
                      style={{ position:'absolute', inset:0, opacity:0, cursor:'pointer', width:'100%', height:'100%' }}
                    >
                      {locationNames.map(n => <option key={n} value={n}>{n}</option>)}
                    </select>
                    <div style={{
                      borderRadius:99, border:'1.34px solid #d1d5db', background:'#fff',
                      display:'inline-flex', alignItems:'center', gap:6, padding:'5px 14px', pointerEvents:'none',
                    }}>
                      <span style={{ fontFamily:"'Nunito',sans-serif", fontSize:13, fontWeight:600, color:'#1a1a2e' }}>
                        {activeLoc.replace(/\w+/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())}
                      </span>
                      <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                        <path d="M2 3.5L5 6.5L8 3.5" stroke="#1a1a2e" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                      </svg>
                    </div>
                  </div>

                  <LocationLineChart
                    locName={activeLoc}
                    year={mData.year} month={mData.month}
                    monthRows={monthRows}
                  />
                </>
              );
            })()}

            {monthViewMode === 'all' && (() => {
              const key   = selectedMonth || (monthCards[0] && monthCards[0].key);
              const mData = monthCards.find(m => m.key === key);
              if (!mData) return null;

              const monthRows = allRows.filter(row => {
                if (!row.date) return false;
                const y = row.date.getFullYear(), mo = row.date.getMonth();
                return `${y}-${String(mo+1).padStart(2,'0')}` === key;
              }).sort((a, b) => a.date - b.date);

              const locationNames = Object.keys(mData.locations).sort((a, b) => a.localeCompare(b));

              return locationNames.map((locName, li) => {
                const dayMap = {};
                for (const row of monthRows) {
                  const val = Math.round(row.locations[locName] ?? 0);
                  if (val > 0) dayMap[row.date.getDate()] = val;
                }
                return (
                  <MonthCalendarCard
                    key={locName} name={locName}
                    year={mData.year} month={mData.month}
                    dayMap={dayMap} colorIdx={li}
                  />
                );
              });
            })()}

            {!monthLoading && monthLoaded && monthCards.length === 0 && (
              <div style={{ textAlign:'center', color:'#99a1af', fontFamily:"'Nunito',sans-serif", fontSize:13 }}>
                No data available
              </div>
            )}
          </>)}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
